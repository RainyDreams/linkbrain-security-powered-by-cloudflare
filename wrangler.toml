name = "zero-ben-backend"
main = "src/index.js"
compatibility_date = "2024-10-01"
compatibility_flags = [ "nodejs_compat" ]
# 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "security-db"
database_id = "824f19e0-9343-4e10-b693-88e314a3880b"
migrations_dir = "migrations"

# Durable Object 类清理：删除旧版本遗留的 AdminWsHub
[[migrations]]
tag = "v1"
deleted_classes = [ "AdminWsHub" ]

[triggers]
crons = [
    "* * * * *"  # 每分钟触发一次，内部逻辑判断时间
]

[vars]
JWT_SECRET = "linkbrainsecurity"
ADMIN_PASSWORD_SALT = "lingbenzhengquanjiaoyi"
ADMIN_PASSWORD_HASH = "90a13d07ea4dbdd759b841d4cc0874e31ae3a4d4b38b1d708547dea7297475fd"
# AI provider default models (override via env secrets)
XIAOMI_MIMO_MODEL = "mimo-7b"
XIAOMI_MIMO_BASE_URL = "https://api.xiaomimimo.com/v1"
DEEPSEEK_MODEL = "deepseek-chat"
DEEPSEEK_BASE_URL = "https://api.deepseek.com/v1"
GEMINI_MODEL = "gemini-flash-lite-latest"
GEMINI_MODELS = "gemini-flash-lite-latest,gemini-2.5-flash-lite,gemini-flash-latest,gemini-2.5-flash,gemini-3-flash-preview"
# Per-role provider override (set to mimo / deepseek / gemini)
AI_PROVIDER_PRESIDENT = "mimo"
AI_PROVIDER_REASONER = "mimo"
AI_PROVIDER_ECONOMIST_1 = "deepseek"
AI_PROVIDER_ECONOMIST_2 = "deepseek"
AI_PROVIDER_MANAGER = "deepseek"
# DEBUG_KEY: set via `wrangler secret put DEBUG_KEY` for production. The value below is a 512-bit CSPRNG key.
DEBUG_KEY = "jxxkKOc3urdEu7l5E68FDnfBDoRJLbXr0o0L1Kn9R6xYMB32v-7DAB07TehJc9U-oa1OhfEFOZ6H-M3XryBzKQ"
